name: Build, Test and Publish

on:
  push:
    branches:
      - main

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Milos.Shared.Core/Milos.Shared.Core.csproj

      - name: Build
        run: dotnet build Milos.Shared.Core/Milos.Shared.Core.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack Milos.Shared.Core/Milos.Shared.Core.csproj --no-build --configuration Release --output ./nupkg

      - name: Publish to GitHub Packages
        run: dotnet nuget push "./nupkg/*.nupkg" --source "https://nuget.pkg.github.com/cicaglisa80/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate